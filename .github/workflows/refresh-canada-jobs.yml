name: Refresh Canada Jobs Snapshot

on:
  schedule:
    - cron: "17 14 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-canada-jobs
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Groq configuration
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "GROQ_API_KEY repository secret is required."
            exit 1
          fi

      - name: Fetch and enrich current Canadian jobs
        run: |
          cp data/processed/canada_jobs_snapshot.csv /tmp/canada_jobs_snapshot.csv
          python scripts/fetch_canada_jobs.py \
            --output-path /tmp/canada_jobs.csv
          python scripts/build_canada_jobs_snapshot.py \
            --input-path /tmp/canada_jobs.csv \
            --output-path /tmp/canada_jobs_snapshot.csv \
            --delay-seconds 1

      - name: Validate refreshed snapshot
        run: |
          python scripts/validate_canada_jobs_snapshot.py \
            --candidate-path /tmp/canada_jobs_snapshot.csv \
            --baseline-path data/processed/canada_jobs_snapshot.csv \
            --summary-path /tmp/snapshot-quality.md
          cp /tmp/canada_jobs_snapshot.csv \
            data/processed/canada_jobs_snapshot.csv

      - name: Run test suite
        run: python -m pytest -q

      - name: Detect snapshot changes
        id: changes
        run: |
          if git diff --quiet -- data/processed/canada_jobs_snapshot.csv; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create refresh branch and commit
        if: steps.changes.outputs.changed == 'true'
        env:
          BRANCH_NAME: automation/canada-jobs-refresh-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH_NAME"
          git add data/processed/canada_jobs_snapshot.csv
          git commit -m "refresh canada jobs snapshot"
          git push origin "$BRANCH_NAME"

      - name: Build pull request summary
        if: steps.changes.outputs.changed == 'true'
        run: |
          {
            echo "## Summary"
            echo
            echo "Refreshed the committed Canada jobs snapshot from first-party employer boards."
            echo
            echo "- Fetched current Canadian technical postings from the configured Greenhouse, Lever, and Ashby boards."
            echo "- Reused Groq skill extractions for unchanged descriptions and re-extracted changed or new postings."
            echo "- Applied role, employer, location, source, freshness, and extraction quality gates."
            echo
            cat /tmp/snapshot-quality.md
            echo "## Testing"
            echo
            echo "- Ran the full \`pytest\` suite successfully in GitHub Actions."
          } > /tmp/pull-request.md

      - name: Open snapshot refresh pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: automation/canada-jobs-refresh-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "Refresh Canada jobs snapshot" \
            --body-file /tmp/pull-request.md
